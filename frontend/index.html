<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SWS AI - Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Livvic:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Livvic', sans-serif;
      background: #f5f7fb;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-container {
      width: 100%;
      max-width: 780px;
      height: 100vh;
      max-height: 860px;
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0, 20, 60, 0.12);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: #1a56db;
      padding: 20px 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header h1 {
      color: #fff;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .chat-header .badge {
      background: rgba(255,255,255,0.2);
      color: #fff;
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 100px;
      font-weight: 500;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      display: flex;
      gap: 12px;
      max-width: 85%;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .message.user .avatar { background: #1a56db; color: #fff; }
    .message.bot .avatar { background: #e8edf5; color: #1a56db; }
    .bubble {
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.55;
    }
    .message.user .bubble {
      background: #1a56db;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .message.bot .bubble {
      background: #f0f4fc;
      color: #1a2b4a;
      border-bottom-left-radius: 4px;
    }
    .sources {
      margin-top: 8px;
      font-size: 12px;
      color: #5a6d8a;
    }
    .sources strong { color: #1a56db; }
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 0;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #a0b4d0;
      animation: typing 1.4s infinite ease-in-out;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
      30% { opacity: 1; transform: scale(1); }
    }
    .input-area {
      border-top: 1px solid #e8edf5;
      padding: 16px 28px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      border: 2px solid #e0e6ef;
      border-radius: 12px;
      padding: 12px 16px;
      font-family: 'Livvic', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }
    .input-area input:focus { border-color: #1a56db; }
    .input-area button {
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-family: 'Livvic', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-area button:hover { background: #1344b0; }
    .input-area button:disabled { background: #a0b4d0; cursor: not-allowed; }
    .welcome {
      text-align: center;
      margin: auto;
      color: #8899b0;
    }
    .welcome h2 { font-size: 18px; font-weight: 600; color: #1a2b4a; margin-bottom: 6px; }
    .welcome p { font-size: 14px; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>SWS AI Assistant</h1>
      <span class="badge">RAG</span>
    </div>

    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <h2>Hello! How can I help you?</h2>
        <p>Ask me about company policies, leave, HR, IT security, and more.</p>
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="questionInput" placeholder="Ask a question..." autofocus />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const welcomeEl = document.getElementById('welcome');
    const input = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');

    function addMessage(text, role, sources = []) {
      welcomeEl.style.display = 'none';
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? 'U' : 'S';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      if (sources.length > 0) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        srcDiv.innerHTML = `<strong>Sources:</strong> ${sources.join(', ')}`;
        bubble.appendChild(srcDiv);
      }
      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function showTyping() {
      const div = document.createElement('div');
      div.className = 'message bot';
      div.id = 'typing';
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = 'S';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      for (let i = 0; i < 3; i++) indicator.appendChild(document.createElement('span'));
      bubble.appendChild(indicator);
      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const typing = document.getElementById('typing');
      if (typing) typing.remove();
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;
      input.value = '';
      addMessage(question, 'user');
      showTyping();
      sendBtn.disabled = true;
      input.disabled = true;
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question }),
        });
        const data = await res.json();
        removeTyping();
        addMessage(data.answer, 'bot', data.sources || []);
      } catch (err) {
        removeTyping();
        addMessage('Sorry, something went wrong. Please try again.', 'bot');
      } finally {
        sendBtn.disabled = false;
        input.disabled = false;
        input.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
